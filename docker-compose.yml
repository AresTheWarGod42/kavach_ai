services:
  kavach-api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: kavach-api
    environment:
      REDIS_URL: redis://redis:6379/0
      POSTGRES_URL: postgresql+psycopg://postgres:postgres@postgres:5432/kavach
      MLFLOW_TRACKING_URI: http://mlflow:5000
      FLOWISE_URL: http://flowise:3000
      N8N_URL: http://n8n:5678
      SIMULATOR_BASE_URL: http://kavach-api:8000
      SIMULATOR_ENABLED: "true"
      SIMULATOR_TPS: "10"
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    volumes:
      - ./backend/exports:/app/backend/exports
      - ./backend/data:/app/backend/data
      - ./backend/kavach/models:/app/backend/kavach/models
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  kavach-frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: kavach-frontend
    depends_on:
      kavach-api:
        condition: service_healthy
    ports:
      - "3000:80"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://127.0.0.1 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: kavach-redis
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: kavach-postgres
    environment:
      POSTGRES_DB: kavach
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kavach"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.20.3
    container_name: kavach-mlflow
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:///mlflow.db", "--default-artifact-root", "/mlruns"]
    volumes:
      - mlruns:/mlruns
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5000 || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: kavach-prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro
    ports:
      - "9090:9090"
    depends_on:
      kavach-api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 15
    restart: unless-stopped

  grafana:
    image: grafana/grafana:11.1.4
    container_name: kavach-grafana
    ports:
      - "3001:3000"
    depends_on:
      prometheus:
        condition: service_healthy
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning
      - grafana-data:/var/lib/grafana
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  n8n:
    image: n8nio/n8n:1.107.4
    container_name: kavach-n8n
    command:
      - /bin/sh
      - -lc
      - >
        (n8n import:workflow --input=/workflows/adaptive-rule-workflow.json || true) &&
        (n8n import:workflow --input=/workflows/threat-intel-workflow.json || true) &&
        n8n start
    ports:
      - "5678:5678"
    environment:
      N8N_SECURE_COOKIE: "false"
      N8N_BASIC_AUTH_ACTIVE: "false"
      N8N_HOST: n8n
      N8N_PORT: 5678
      WEBHOOK_URL: http://localhost:5678/
    volumes:
      - n8n-data:/home/node/.n8n
      - ./n8n/workflows:/workflows:ro
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:5678/healthz || wget --spider -q http://localhost:5678 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  flowise:
    image: flowiseai/flowise:2.2.8
    container_name: kavach-flowise
    ports:
      - "3002:3000"
    environment:
      PORT: 3000
    volumes:
      - flowise-data:/root/.flowise
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
    restart: unless-stopped

volumes:
  pgdata:
  mlruns:
  grafana-data:
  n8n-data:
  flowise-data:
